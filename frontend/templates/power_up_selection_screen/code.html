<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Quiz Clash - Power-up Selection</title>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;

        .glow-primary { box-shadow: 0 0 20px rgba(192, 193, 255, 0.3); }
        .glow-tertiary { box-shadow: 0 0 20px rgba(74, 225, 118, 0.3); }
        .glow-secondary { box-shadow: 0 0 20px rgba(255, 178, 183, 0.3); }
        
        @keyframes timer-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .animate-timer { animation: timer-pulse 1.5s ease-in-out infinite; }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(192, 193, 255, 0.5);
            background: rgba(49, 43, 91, 0.4);
        }
    </style>

                        "surface-variant": "#34343d",

                    "spacing": {
                        "stack-lg": "48px",

<body class="bg-background text-on-background font-body-lg min-h-screen selection:bg-primary selection:text-on-primary">
<!-- Top AppBar Component -->
<header class="bg-surface/80 backdrop-blur-md dark:bg-surface/80 docked full-width top-0 z-50 border-b border-white/10 shadow-lg shadow-primary/20 fixed">
<div class="flex justify-between items-center px-margin-mobile h-16 w-full max-w-container-max mx-auto">
<h1 class="font-display-lg text-display-lg-mobile tracking-tighter text-primary drop-shadow-[0_0_10px_rgba(192,193,255,0.5)]">
                Quiz Clash
            </h1>
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-white/5 transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined">settings</span>
</button>
<div class="w-10 h-10 rounded-full border-2 border-primary overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A stylized 3D avatar of a futuristic quiz player wearing glowing neon goggles and a sleek dark jumpsuit. The background is a blurred arena with vibrant purple and teal lighting. The character has a confident expression, rendered in a high-fidelity digital art style consistent with modern competitive gaming interfaces." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA5V61fUChGnRRbOgaeRdHvliNRdUm50sm-8lX1gggLpOQTS_5A9Zf5CgPDqaZB5mtu8xn93EeUkR4h4gSLcwvzSMXCS1k9ze0LPoIauH5ppJGJ-oK397n9EH5GaknFdM9IUnVPaovxqwdbnOHWA1PURrWmpBPaeDO_MAARbVXk9uHv4Dbryw0HpDHAodxzHzNpTjZLJkvrXd2Hk4GUk-D4RZinrXHxpY0QkQorRVk0ltcJc2bJtxDEFabTberKFomsIDbaiRqhkhA">
</div>
</div>
</div>
</header>
<!-- Main Content -->
<main class="pt-24 pb-32 px-margin-mobile max-w-container-max mx-auto relative min-h-screen">
<!-- Animated Background Shader -->
<div class="fixed inset-0 -z-10 opacity-30 pointer-events-none">

</div>
<!-- Selection Header & Timer -->
<section class="flex flex-col items-center mb-stack-lg text-center">
<div class="mb-stack-sm inline-flex items-center gap-2 bg-surface-container-high px-4 py-1.5 rounded-full border border-white/5">
<span class="material-symbols-outlined text-primary animate-timer" style="font-variation-settings: 'FILL' 1;">timer</span>
<span class="font-label-caps text-label-caps text-error" id="timer-text">TIME'S UP!</span>
</div>
<h2 class="font-display-lg text-display-lg-mobile md:text-display-lg text-on-surface tracking-tight mb-2">
                Choose Your Power-up
            </h2>
<p class="text-on-surface-variant max-w-md mx-auto font-body-sm">
                Select a tactical 'zagrywka' to disrupt your opponents or boost your score in the upcoming round.
            </p>
</section>
<!-- Power-up Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-gutter mb-stack-lg">
<!-- Power-up Card: Double Points -->
<button class="glass-card group p-6 rounded-lg flex flex-col items-start text-left relative overflow-hidden border-primary bg-primary/5 ring-2 ring-primary/30" onclick="selectPowerUp(this)">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/10 blur-3xl -mr-16 -mt-16 group-hover:bg-primary/20 transition-colors"></div>
<div class="mb-6 w-14 h-14 rounded-xl bg-primary/20 flex items-center justify-center border border-primary/30 glow-primary">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">star_half</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Double Points</h3>
<p class="text-on-surface-variant font-body-sm mb-6">Receive twice the points for every correct answer in the next round. High risk, high reward!</p>
<div class="mt-auto flex items-center gap-2 text-primary font-label-caps text-label-caps">
<span class="material-symbols-outlined text-sm">bolt</span>
                    COMMON
                </div>
</button>
<!-- Power-up Card: Freeze Timer -->
<button class="glass-card group p-6 rounded-lg flex flex-col items-start text-left relative overflow-hidden" onclick="selectPowerUp(this)">
<div class="absolute top-0 right-0 w-32 h-32 bg-tertiary/10 blur-3xl -mr-16 -mt-16 group-hover:bg-tertiary/20 transition-colors"></div>
<div class="mb-6 w-14 h-14 rounded-xl bg-tertiary/20 flex items-center justify-center border border-tertiary/30 glow-tertiary">
<span class="material-symbols-outlined text-tertiary text-4xl" style="font-variation-settings: 'FILL' 1;">ac_unit</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Freeze Timer</h3>
<p class="text-on-surface-variant font-body-sm mb-6">Stop the countdown for 5 seconds, giving you extra time to think on the toughest questions.</p>
<div class="mt-auto flex items-center gap-2 text-tertiary font-label-caps text-label-caps">
<span class="material-symbols-outlined text-sm">bolt</span>
                    RARE
                </div>
</button>
<!-- Power-up Card: Blur Answers -->
<button class="glass-card group p-6 rounded-lg flex flex-col items-start text-left relative overflow-hidden" onclick="selectPowerUp(this)">
<div class="absolute top-0 right-0 w-32 h-32 bg-secondary/10 blur-3xl -mr-16 -mt-16 group-hover:bg-secondary/20 transition-colors"></div>
<div class="mb-6 w-14 h-14 rounded-xl bg-secondary/20 flex items-center justify-center border border-secondary/30 glow-secondary">
<span class="material-symbols-outlined text-secondary text-4xl" style="font-variation-settings: 'FILL' 1;">visibility_off</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Blur Answers</h3>
<p class="text-on-surface-variant font-body-sm mb-6">Disrupt other players by partially blurring their answer options for the first 3 seconds.</p>
<div class="mt-auto flex items-center gap-2 text-secondary font-label-caps text-label-caps">
<span class="material-symbols-outlined text-sm">bolt</span>
                    EPIC
                </div>
</button>
<!-- Power-up Card: Fifty-Fifty -->
<button class="glass-card group p-6 rounded-lg flex flex-col items-start text-left relative overflow-hidden" onclick="selectPowerUp(this)">
<div class="absolute top-0 right-0 w-32 h-32 bg-primary-container/10 blur-3xl -mr-16 -mt-16 group-hover:bg-primary-container/20 transition-colors"></div>
<div class="mb-6 w-14 h-14 rounded-xl bg-primary-container/20 flex items-center justify-center border border-primary-container/30">
<span class="material-symbols-outlined text-primary-container text-4xl" style="font-variation-settings: 'FILL' 1;">exposure_zero</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-2">Fifty-Fifty</h3>
<p class="text-on-surface-variant font-body-sm mb-6">Eliminate two incorrect answers automatically on a question of your choice.</p>
<div class="mt-auto flex items-center gap-2 text-primary-container font-label-caps text-label-caps">
<span class="material-symbols-outlined text-sm">bolt</span>
                    COMMON
                </div>
</button>
</div>
<!-- Action Footer -->
<div class="flex flex-col items-center gap-4">
<button class="w-full max-w-sm h-16 rounded-lg bg-primary text-on-primary font-bold text-body-lg shadow-[0_0_20px_rgba(192,193,255,0.4)] hover:brightness-110 active:scale-95 transition-all disabled:opacity-50 disabled:grayscale disabled:scale-100" id="confirm-btn">
                Confirm Selection
            </button>
<p class="text-outline text-label-caps">Round 4 of 10 • Current Rank: #3</p>
</div>
</main>
<!-- Bottom Navigation Component -->

<script>
        let selectedPowerUpCard = null;

        function selectPowerUp(element) {
            // Remove active styles from previous selection
            if (selectedPowerUpCard) {
                selectedPowerUpCard.classList.remove('border-primary', 'bg-primary/5', 'ring-2', 'ring-primary/30');
                selectedPowerUpCard.classList.add('border-white/10');
            }

            // Apply active styles
            element.classList.remove('border-white/10');
            element.classList.add('border-primary', 'bg-primary/5', 'ring-2', 'ring-primary/30');
            selectedPowerUpCard = element;

            // Enable confirm button
            const confirmBtn = document.getElementById('confirm-btn');
            confirmBtn.disabled = false;
        }

        // Simple Timer Countdown Simulation
        let timeLeft = 14;
        const timerElement = document.getElementById('timer-text');
        
        const countdown = setInterval(() => {
            timeLeft--;
            if (timeLeft <= 0) {
                clearInterval(countdown);
                timerElement.innerText = "TIME'S UP!";
                timerElement.classList.add('text-error');
                // Auto-confirm logic could go here
            } else {
                timerElement.innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft} SECONDS LEFT`;
                if (timeLeft <= 5) {
                    timerElement.classList.add('text-error');
                    timerElement.classList.remove('text-primary');
                }
            }
        }, 1000);
    </script>


</body></html>
