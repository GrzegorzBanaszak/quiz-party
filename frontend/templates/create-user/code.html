                        Join Room

</button>

<div class="fixed bottom-20 left-[10%] w-24 h-24 opacity-20 floating pointer-events-none" style="animation-delay: -2s;">
<div class="w-full h-full border-[12px] border-secondary rounded-full"></div>
</div>

<script>
        function selectAvatar(button) {
            // Remove selection from all
            document.querySelectorAll('.avatar-option').forEach(opt => {
                opt.classList.remove('selected');
                opt.classList.remove('vibrant-glow');
            });
            // Add to current
            button.classList.add('selected');
            button.classList.add('vibrant-glow');
        }

        // Room code auto-focus logic
        const codeInput = document.querySelector('input[placeholder="0000"]');
        codeInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        // Simple enter-key submission
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const btn = document.querySelector('button.vibrant-glow');
                btn.click();
            }
        });
    </script>
