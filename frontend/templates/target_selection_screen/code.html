<script>
        // Simple Selection Logic
        let selectedElement = null;
        const confirmBtn = document.getElementById('confirm-btn');

        function selectTarget(el) {
            // Reset previous
            if (selectedElement) {
                selectedElement.classList.remove('border-primary', 'bg-primary/10', 'vibrant-glow');
                selectedElement.classList.add('border-white/5', 'bg-surface-container');
            }

            // Set new
            selectedElement = el;
            el.classList.add('border-primary', 'bg-primary/10', 'vibrant-glow');
            el.classList.remove('border-white/5', 'bg-surface-container');

            // Enable Confirm
            confirmBtn.disabled = false;
            confirmBtn.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
            confirmBtn.classList.add('bg-primary', 'text-on-primary', 'hover:shadow-[0_0_20px_rgba(192,193,255,0.6)]');
            
            // Micro-interaction haptic simulation
            if (window.navigator.vibrate) window.navigator.vibrate(50);
        }

        // Timer countdown simulation
        let timeLeft = 8;
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');

        const interval = setInterval(() => {
            timeLeft -= 1;
            timerText.innerText = `0${timeLeft}s`;
            timerBar.style.width = `${(timeLeft / 10) * 100}%`;
            
            if (timeLeft <= 3) {
                timerText.classList.remove('text-secondary');
                timerText.classList.add('text-error', 'animate-pulse');
            }
            
            if (timeLeft <= 0) {
                clearInterval(interval);
                // Handle timeout...
            }
        }, 1000);

        // Particle effect logic (Atmospheric)
        function createParticles() {
            const body = document.body;
            for (let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'absolute pointer-events-none w-1 h-1 bg-primary/20 rounded-full';
                particle.style.left = Math.random() * 100 + 'vw';
                particle.style.top = Math.random() * 100 + 'vh';
                particle.style.animation = `float ${5 + Math.random() * 10}s infinite linear`;
                body.appendChild(particle);
            }
        }

        const styleSheet = document.createElement("style");
        styleSheet.innerText = `
            @keyframes float {
                0% { transform: translateY(0) translateX(0); opacity: 0; }
                50% { opacity: 1; }
                100% { transform: translateY(-100vh) translateX(50px); opacity: 0; }
            }
        `;
